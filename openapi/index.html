<!DOCTYPE html>
<html lang="en">
  <head>
    <title>OpenAPI Documentation - SMART Base</title>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" type="text/css"
          href="https://unpkg.com/swagger-ui-dist@5.11.0/swagger-ui.css">
    <style>
      body { margin: 0; padding: 0; font-family: Arial, Helvetica, sans-serif; }
      /* WHO-styled header bar */
      .who-header {
        background-color: #00477d;
        color: #ffffff;
        padding: 0.6rem 1.5rem;
        display: flex;
        align-items: center;
        gap: 1.5rem;
        font-size: 1rem;
        font-weight: 600;
        letter-spacing: 0.01em;
      }
      .who-header a.home-link {
        color: #ffffff;
        text-decoration: none;
        font-size: 0.9rem;
        font-weight: 600;
        border: 1px solid rgba(255,255,255,0.6);
        padding: 0.25rem 0.75rem;
        border-radius: 3px;
        transition: background-color 0.2s ease;
      }
      .who-header a.home-link:hover {
        background-color: rgba(255,255,255,0.15);
        text-decoration: none;
      }
      .who-header .header-title {
        flex: 1;
      }
      /* Definition selector bar below the header */
      #definition-selector-bar {
        background-color: #0070a1;
        color: #ffffff;
        padding: 0.5rem 1.5rem;
        display: flex;
        align-items: center;
        gap: 0.75rem;
        font-size: 0.9rem;
        flex-wrap: wrap;
      }
      #definition-selector-bar label {
        font-weight: 600;
        white-space: nowrap;
      }
      #definition-select {
        font-size: 0.9rem;
        padding: 0.25rem 0.5rem;
        border-radius: 3px;
        border: 1px solid rgba(255,255,255,0.6);
        background-color: #ffffff;
        color: #00477d;
        min-width: 200px;
        max-width: 100%;
        flex: 1;
      }
      /* Hide Swagger UI topbar entirely */
      .swagger-ui .topbar {
        display: none;
      }
      .existing-api-content { padding: 1rem 2rem; }
    </style>
  </head>
  <body>
  <div class="who-header">
    <a href="../index.html" class="home-link">&#8962; Home</a>
    <span class="header-title">SMART Base &mdash; OpenAPI Documentation</span>
  </div>

  <div id="definition-selector-bar">
    <label for="definition-select">Select a definition:</label>
    <select id="definition-select" onchange="switchDefinition(this.value)">
    </select>
  </div>
  <div id="swagger-ui"></div>
  <script src="https://unpkg.com/swagger-ui-dist@5.11.0/swagger-ui-bundle.js"></script>
  <script>
  var swaggerUrls = [
  {
    "url": "../ValueSets.openapi.json",
    "name": "ValueSet Enumeration Schema"
  },
  {
    "url": "../ValueSet-Actors.openapi.json",
    "name": "WHO GDHCN Actor ValueSet of actor codes Schema"
  },
  {
    "url": "../ValueSet-PayloadTypes.openapi.json",
    "name": "WHO GDHCN Payload Types Schema"
  },
  {
    "url": "../ValueSet-Participants-UAT.openapi.json",
    "name": "WHO GDHCN Trust Network Participant - UAT Schema"
  },
  {
    "url": "../ValueSet-KeyUsage-DEV.openapi.json",
    "name": "WHO GDHCN  Key Usage ValueSet - DEV Schema"
  },
  {
    "url": "../ValueSet-Domains-UAT.openapi.json",
    "name": "WHO GDHCN Trust Domains - UAT Schema"
  },
  {
    "url": "../ValueSet-Domains-DEV.openapi.json",
    "name": "WHO GDHCN Trust Domains - DEV Schema"
  },
  {
    "url": "../ValueSet-Domains.openapi.json",
    "name": "WHO GDHCN Trust Domains Schema"
  },
  {
    "url": "../ValueSet-KeyUsage.openapi.json",
    "name": "WHO GDHCN  Key Usage ValueSet Schema"
  },
  {
    "url": "../ValueSet-Participants.openapi.json",
    "name": "WHO GDHCN Trust Network Participant Schema"
  },
  {
    "url": "../ValueSet-Transactions.openapi.json",
    "name": "WHO GDHCN Transaction Codes Schema"
  },
  {
    "url": "../ValueSet-Participants-DEV.openapi.json",
    "name": "WHO GDHCN Trust Network Participant - DEV Schema"
  },
  {
    "url": "../ValueSet-KeyUsage-UAT.openapi.json",
    "name": "WHO GDHCN  Key Usage ValueSet - UAT Schema"
  },
  {
    "url": "../ValueSet-WHORegionalOffices.openapi.json",
    "name": "WHO Regional Offices Schema"
  },
  {
    "url": "../ValueSet-ConnectionTypes.openapi.json",
    "name": "WHO GDHCN Connection Types Schema"
  },
  {
    "url": "../StructureDefinition-CWTPayload.openapi.json",
    "name": "CBOR Web Token (CWT) Payload (Common)"
  },
  {
    "url": "../StructureDefinition-COSEHeader.openapi.json",
    "name": "COSE Headers (DRAFT)"
  },
  {
    "url": "../StructureDefinition-HCert.openapi.json",
    "name": "Health Certificate"
  },
  {
    "url": "../StructureDefinition-CWT.openapi.json",
    "name": "CBOR Web Token (CWT) Claim"
  },
  {
    "url": "../StructureDefinition-SchemeInformation.openapi.json",
    "name": "Scheme Information"
  },
  {
    "url": "../LogicalModels.openapi.json",
    "name": "Logical Model Enumeration Schema"
  },
  {
    "url": "./openapi.json",
    "name": "openapi"
  }
];
  var ui;
  window.onload = function() {
    var select = document.getElementById('definition-select');
    swaggerUrls.forEach(function(item, idx) {
      var opt = document.createElement('option');
      opt.value = item.url;
      opt.textContent = item.name;
      select.appendChild(opt);
    });
    ui = SwaggerUIBundle({
      url: "../ValueSets.openapi.json",
      dom_id: '#swagger-ui',
      presets: [SwaggerUIBundle.presets.apis],
      layout: "BaseLayout"
    });
  };
  function switchDefinition(url) {
    ui.specActions.updateUrl(url);
    ui.specActions.download(url);
  }
  </script>

  </body>
</html>
